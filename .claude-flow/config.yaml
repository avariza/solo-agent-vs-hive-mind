# RuFlo V3 Runtime Configuration
# Generated: 2026-04-13T00:34:14.627Z

version: "3.0.0"

swarm:
  topology: hierarchical
  maxAgents: 8
  autoScale: true
  coordinationStrategy: raft
  agentPools:
    coder:
      min: 2
      max: 4
      priority: high
    reviewer:
      min: 1
      max: 2
      priority: high
    tester:
      min: 1
      max: 2
      priority: medium

memory:
  backend: hybrid
  enableHNSW: true
  persistPath: .claude-flow/data
  cacheSize: 500
  # ADR-049: Self-Learning Memory
  learningBridge:
    enabled: true
    sonaMode: balanced
    confidenceDecayRate: 0.005
    accessBoostAmount: 0.03
    consolidationThreshold: 10
  memoryGraph:
    enabled: true
    pageRankDamping: 0.85
    maxNodes: 5000
    similarityThreshold: 0.7
  agentScopes:
    enabled: true
    defaultScope: project

neural:
  enabled: true
  modelPath: .claude-flow/neural

hooks:
  enabled: true
  autoExecute: true

mcp:
  autoStart: true
  port: 3000
